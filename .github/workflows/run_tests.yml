name: Python App - Simplex Tests 

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configure and install dependencies
        shell: cmd
        run: |
          if exist scripts\config.bat (
              echo Executando scripts\config.bat...
              call scripts\config.bat
          ) else (
              echo scripts\config.bat nao encontrado!
              exit /b 1
          )

      - name: Run tests
        shell: cmd
        run: |
          if exist scripts\run_tests.bat (
              echo Executando scripts\run_tests.bat...
              call scripts\run_tests.bat
          ) else (
              echo scripts\run_tests.bat nao encontrado!
              exit /b 1
          )

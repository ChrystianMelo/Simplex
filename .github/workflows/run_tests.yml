name: Python App - Simplex Tests 

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          if exist requirements.txt (
              pip install -r requirements.txt
          ) else (
              echo Nenhum requirements.txt encontrado.
          )

      - name: Configure (venv + install)
        shell: cmd
        run: |
          if exist config.bat (
            echo Executando config.bat...
            call config.bat
          ) else (
            echo config.bat nao encontrado, pulando configuracao.
          )

      - name: Run test.bat
        shell: cmd
        run: |
          if exist run_tests.bat (
              echo Executando run_tests.bat...
              call run_tests.bat
          ) else (
              echo run_tests.bat nao encontrado!
              exit /b 1
          )
